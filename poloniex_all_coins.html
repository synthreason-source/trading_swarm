function fmtP(p){
  if(p>=1000)return'$'+p.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)return'$'+p.toFixed(2);
  if(p>=0.001)return'$'+p.toFixed(4);
  if(p>=0.000001)return'$'+p.toFixed(6);
  return'$'+p.toExponential(3);
}
function fmtV(v){
  if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'B';
  if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M';
  if(v>=1e3)return'$'+(v/1e3).toFixed(1)+'K';
  return v>0?'$'+v.toLocaleString():'—';
}
function inRange(p){return p>=2&&p<=500;}

let sortCol='r',sortDir=1;
function sort(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
  render();
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const f=document.getElementById('filter').value;
  let data=coins.filter(c=>{
    const match=c.n.toLowerCase().includes(q)||c.s.toLowerCase().includes(q);
    const rng=f==='range'?inRange(c.p):true;
    return match&&rng;
  });
  data.sort((a,b)=>{
    if(sortCol==='r')return(a.r-b.r)*sortDir;
    if(sortCol==='price')return(a.p-b.p)*sortDir;
    if(sortCol==='vol')return(a.v-b.v)*sortDir;
    if(sortCol==='sym')return a.s.localeCompare(b.s)*sortDir;
    if(sortCol==='name')return a.n.localeCompare(b.n)*sortDir;
    return 0;
  });
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=data.map(c=>`
    <tr>
      <td class="rank">${c.r}</td>
      <td class="sym">${c.s}</td>
      <td class="name">${c.n}${inRange(c.p)?` <span class="badge">$2–$500</span>`:''}</td>
      <td class="price">${fmtP(c.p)}</td>
      <td class="vol">${fmtV(c.v)}</td>
    </tr>
  `).join('');
}

document.getElementById('search').addEventListener('input',render);
document.getElementById('filter').addEventListener('change',render);
render();
</script>
